<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step-by-Step AI Integration Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        .warning { background-color: #fff3cd; border-color: #ffeaa7; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>
    <h1>🔧 Step-by-Step AI Integration Test</h1>
    
    <div class="test-section info">
        <h3>Step 1: Environment Check</h3>
        <div id="env-check">
            <p>API Token Present: <span id="token-status">Checking...</span></p>
            <p>Environment: <span id="env-status">Checking...</span></p>
        </div>
    </div>
    
    <div class="test-section">
        <h3>Step 2: Simple Enhancer Test (Always Works)</h3>
        <button onclick="testSimpleEnhancer()">Test Simple Enhancement</button>
        <div id="simple-result"></div>
    </div>
    
    <div class="test-section">
        <h3>Step 3: Direct Hugging Face API Test</h3>
        <button onclick="testDirectHF()">Test Direct API Call</button>
        <div id="direct-result"></div>
    </div>
    
    <div class="test-section">
        <h3>Step 4: Integration Layer Test</h3>
        <button onclick="testIntegrationLayer()">Test Full Integration</button>
        <div id="integration-result"></div>
    </div>

    <script type="module">
        // Step 1: Environment check
        const checkEnvironment = () => {
            const token = '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';
            const hasValidToken = token && token.startsWith('hf_') && token.length > 10;
            
            document.getElementById('token-status').innerHTML = hasValidToken ? 
                '<span style="color: green;">✅ Valid</span>' : 
                '<span style="color: red;">❌ Invalid</span>';
                
            document.getElementById('env-status').innerHTML = 
                '<span style="color: green;">✅ Browser Environment Ready</span>';
        };
        
        // Step 2: Test simple enhancer (should always work)
        window.testSimpleEnhancer = () => {
            const resultDiv = document.getElementById('simple-result');
            resultDiv.innerHTML = '<p class="loading">Testing simple enhancer...</p>';
            
            const originalText = "Portfolio risk analysis indicates elevated volatility metrics exceeding threshold parameters.";
            
            // Simulate simple enhancement
            const enhanced = originalText
                .replace(/volatility metrics/gi, 'market fluctuation measures')
                .replace(/threshold parameters/gi, 'risk limits')
                .replace(/indicates/gi, 'shows');
            
            const wasEnhanced = enhanced !== originalText;
            
            resultDiv.innerHTML = `
                <div class="success">
                    <h4>✅ Simple Enhancement Works</h4>
                    <p><strong>Original:</strong> "${originalText}"</p>
                    <p><strong>Enhanced:</strong> "${enhanced}"</p>
                    <p><strong>Status:</strong> ${wasEnhanced ? 'Enhanced successfully' : 'No changes needed'}</p>
                </div>
            `;
        };
        
        // Step 3: Test direct Hugging Face API
        window.testDirectHF = async () => {
            const resultDiv = document.getElementById('direct-result');
            resultDiv.innerHTML = '<p class="loading">Testing direct Hugging Face API...</p>';
            
            const originalText = "Portfolio risk analysis indicates elevated volatility metrics.";
            const enhancedPrompt = `Financial Analysis: ${originalText}. This analysis discusses investment risks and portfolio considerations for financial planning purposes.`;
            
            try {
                const response = await fetch('https://api-inference.huggingface.co/models/facebook/bart-large-cnn', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer 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',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        inputs: enhancedPrompt,
                        parameters: {
                            max_length: 100,
                            min_length: 30,
                            do_sample: false
                        },
                        options: {
                            wait_for_model: true,
                            use_cache: false
                        }
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    
                    if (data && Array.isArray(data) && data[0] && data[0].summary_text) {
                        resultDiv.innerHTML = `
                            <div class="success">
                                <h4>✅ Hugging Face API Works</h4>
                                <p><strong>Original:</strong> "${originalText}"</p>
                                <p><strong>API Response:</strong> "${data[0].summary_text}"</p>
                                <p><strong>Status:</strong> API call successful</p>
                            </div>
                        `;
                    } else if (data.error && data.error.includes('loading')) {
                        resultDiv.innerHTML = `
                            <div class="warning">
                                <h4>⏳ Model Loading</h4>
                                <p>The model is currently loading. This can take 1-2 minutes for the first request.</p>
                                <p>Try again in a few moments.</p>
                                <pre>${JSON.stringify(data, null, 2)}</pre>
                            </div>
                        `;
                    } else {
                        resultDiv.innerHTML = `
                            <div class="error">
                                <h4>❌ Unexpected Response Format</h4>
                                <pre>${JSON.stringify(data, null, 2)}</pre>
                            </div>
                        `;
                    }
                } else {
                    const errorText = await response.text();
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h4>❌ API Error</h4>
                            <p>Status: ${response.status} ${response.statusText}</p>
                            <p>Response: ${errorText}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ Connection Error</h4>
                        <p>${error.message}</p>
                        <p>Check your internet connection.</p>
                    </div>
                `;
            }
        };
        
        // Step 4: Test integration layer (would need to import modules)
        window.testIntegrationLayer = () => {
            const resultDiv = document.getElementById('integration-result');
            resultDiv.innerHTML = `
                <div class="info">
                    <h4>ℹ️ Integration Layer Test</h4>
                    <p>This test requires the full React application context.</p>
                    <p>To test the integration layer:</p>
                    <ol>
                        <li>Go to the main application: <a href="http://localhost:5000/" target="_blank">http://localhost:5000/</a></li>
                        <li>Navigate to "Investor Recommendations"</li>
                        <li>Look for AI-enhanced warnings and explanations</li>
                        <li>Check the browser console for AI provider status logs</li>
                    </ol>
                </div>
            `;
        };
        
        // Initialize
        checkEnvironment();
    </script>
</body>
</html>
